<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decibel Pro</title>
<style>
  :root {
    --bg: #0A0A0F;
    --fg: #FFFFFF;
    --mint: #00E5A0;
    --muted: rgba(255, 255, 255, 0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  main {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .mark {
    width: 96px;
    height: 96px;
    margin: 0 auto 32px;
    display: flex;
    align-items: end;
    justify-content: center;
    gap: 6px;
  }
  .bar {
    width: 10px;
    background: var(--mint);
    border-radius: 4px;
    box-shadow: 0 0 24px rgba(0, 229, 160, 0.35);
  }
  .bar:nth-child(1) { height: 28%; }
  .bar:nth-child(2) { height: 52%; }
  .bar:nth-child(3) { height: 76%; }
  .bar:nth-child(4) { height: 100%; }
  .bar:nth-child(5) { height: 76%; }
  .bar:nth-child(6) { height: 52%; }
  .bar:nth-child(7) { height: 28%; }
  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .tagline {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 48px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 48px;
  }
  a.btn {
    display: block;
    padding: 18px 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    color: var(--fg);
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }
  a.btn:hover {
    background: rgba(0, 229, 160, 0.06);
    border-color: rgba(0, 229, 160, 0.3);
    transform: translateY(-1px);
  }
  footer {
    color: var(--muted);
    font-size: 13px;
  }
  footer a {
    color: var(--mint);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <div class="mark" aria-hidden="true">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <h1>Decibel Pro</h1>
  <p class="tagline">A precision sound level meter for iPhone.</p>
  <nav class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="terms.html">Terms of Use</a>
  </nav>
  <footer>
    Made by Cloud Motion Lab &middot;
    <a href="mailto:hello@cloudmotionlab.com">hello@cloudmotionlab.com</a>
  </footer>
</main>
</body>
</html>
